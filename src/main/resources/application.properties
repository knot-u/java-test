spring.application.name=prueba-tecnica
server.port=8080

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.datasource.url=jdbc:mysql://localhost:3306/prueba
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.security.admin-username=admin
app.security.admin-password=admin123
app.security.jwt-secret=change-me-to-a-very-long-secret-key-at-least-32-characters
app.security.jwt-expiration-ms=3600000

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.org.springframework.web=INFO
logging.level.com.test.prueba=DEBUG